name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode
        shell: bash
        run: |
          set -euo pipefail
          XCODE_PATH="$(ls -1d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)"
          if [[ -z "${XCODE_PATH:-}" ]]; then
            echo "No Xcode installation found on runner." >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Verify Swift 6 toolchain
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          if ! swift --version | grep -E "Swift version 6\\." >/dev/null; then
            echo "Swift 6.x is required for CI." >&2
            exit 1
          fi

      - name: Build
        run: swift build

      - name: Test
        run: swift test
